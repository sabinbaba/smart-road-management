<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Traffic — Live Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .monitor-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 16px;
    height: calc(100vh - var(--header-height) - var(--footer-height) - 48px);
  }

  .camera-panel { display: flex; flex-direction: column; gap: 12px; }

  .camera-frame {
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 360px;
  }

  .hud-corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--blue-bright);
    border-style: solid;
    opacity: 0.7;
    z-index: 5;
  }
  .hud-tl { top:12px; left:12px;   border-width:2px 0 0 2px; }
  .hud-tr { top:12px; right:12px;  border-width:2px 2px 0 0; }
  .hud-bl { bottom:12px; left:12px;  border-width:0 0 2px 2px; }
  .hud-br { bottom:12px; right:12px; border-width:0 2px 2px 0; }

  .cam-feed { width:100%; height:100%; object-fit:cover; display:block; }

  .cam-offline {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; letter-spacing: 2px;
  }
  .cam-offline-icon { font-size: 48px; opacity: 0.3; }

  .cam-overlay {
    position: absolute; top:0; left:0; right:0;
    padding: 12px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    display: flex; align-items: center; justify-content: space-between;
    z-index: 4;
  }

  .cam-status-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px; border-radius: 4px; border: 1px solid;
    font-family: 'Rajdhani', sans-serif; font-size: 15px;
    font-weight: 700; letter-spacing: 2px;
    backdrop-filter: blur(4px); transition: all 0.4s;
  }
  .cam-status-badge.normal     { background:rgba(0,255,136,0.12); border-color:rgba(0,255,136,0.4); color:var(--accent-green); }
  .cam-status-badge.congestion { background:rgba(255,170,0,0.12); border-color:rgba(255,170,0,0.4); color:var(--accent-orange); }
  .cam-status-badge.accident   {
    background:rgba(255,51,85,0.15); border-color:rgba(255,51,85,0.5);
    color:var(--accent-red); animation:alertFlash 1s ease-in-out infinite;
  }
  @keyframes alertFlash { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

  .cam-overlay-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }

  .cam-meta-pill {
    padding: 3px 10px; border-radius: 3px;
    background: rgba(0,0,0,0.5); border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--text-muted); backdrop-filter: blur(4px); letter-spacing: 1px;
  }

  .cam-bottom-overlay {
    position: absolute; bottom:0; left:0; right:0;
    padding: 12px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    display: flex; align-items: flex-end; justify-content: space-between;
    z-index: 4;
  }
  .cam-timestamp { font-family:'Share Tech Mono',monospace; font-size:11px; color:rgba(255,255,255,0.5); letter-spacing:1px; }
  .cam-source    { font-family:'Share Tech Mono',monospace; font-size:10px; color:rgba(255,255,255,0.35); letter-spacing:1px; }

  .scan-overlay {
    position: absolute; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.4), transparent);
    animation: scanOverlay 4s linear infinite;
    pointer-events: none; z-index: 3;
  }
  @keyframes scanOverlay {
    0%   { top:0; opacity:0; }
    5%   { opacity:1; }
    95%  { opacity:1; }
    100% { top:100%; opacity:0; }
  }

  .control-btn {
    padding: 7px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: rgba(0,50,100,0.2);
    color: var(--text-muted); font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .control-btn:hover  { border-color:var(--border-bright); color:var(--text-primary); background:rgba(0,100,180,0.2); }
  .control-btn.active { border-color:var(--blue-bright);   color:var(--blue-bright);  background:rgba(0,200,255,0.08); }

  .rate-label { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-dim); letter-spacing:1px; }

  .right-panel { display:flex; flex-direction:column; gap:12px; overflow-y:auto; }

  .detail-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; position: relative; flex-shrink: 0;
  }
  .detail-card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    border-radius:10px 10px 0 0;
    background: var(--detail-color, var(--blue-bright)); transition:background 0.4s;
  }

  .detail-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 0; border-bottom:1px solid rgba(0,200,255,0.04);
  }
  .detail-row:last-child { border-bottom:none; }
  .detail-key { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; }
  .detail-val { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:var(--text-primary); text-align:right; }

  .alert-log {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:10px; flex:1; display:flex; flex-direction:column; overflow:hidden;
  }
  .alert-log-header {
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .alert-log-title {
    font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600;
    letter-spacing:2px; color:var(--text-muted); text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .alert-log-title::before {
    content:''; display:inline-block; width:3px; height:13px;
    background:var(--blue-bright); border-radius:2px;
  }
  .alert-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); }

  .alert-list { flex:1; overflow-y:auto; padding:8px 0; }

  .alert-entry {
    display:flex; align-items:flex-start; gap:10px;
    padding:10px 18px; border-bottom:1px solid rgba(0,200,255,0.03);
    animation: alertIn 0.3s ease;
  }
  @keyframes alertIn { from{opacity:0;transform:translateX(10px);} to{opacity:1;transform:translateX(0);} }
  .alert-entry:last-child { border-bottom:none; }
  .alert-icon  { font-size:14px; flex-shrink:0; margin-top:1px; }
  .alert-body  { flex:1; }
  .alert-status { font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; }
  .alert-status.normal     { color:var(--accent-green); }
  .alert-status.congestion { color:var(--accent-orange); }
  .alert-status.accident   { color:var(--accent-red); }
  .alert-detail { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); margin-top:2px; }
  .alert-time   { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--text-dim); flex-shrink:0; margin-top:2px; }

  .vehicle-counter { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .vehicle-dot { width:10px; height:10px; border-radius:2px; background:var(--blue-mid); transition:background 0.3s; }
  .vehicle-dot.active { background:var(--blue-bright); box-shadow:0 0 5px var(--blue-bright); }

  .conf-bar-wrap { width:100%; height:4px; background:var(--bg-deep); border-radius:2px; overflow:hidden; margin-top:4px; }
  .conf-bar-fill { height:100%; border-radius:2px; background:var(--blue-bright); transition:width 0.5s ease; }

  .empty-state {
    text-align:center; padding:20px;
    color:var(--text-dim); font-family:'Share Tech Mono',monospace;
    font-size:12px; letter-spacing:2px;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <header class="header" id="header"></header>

  <main class="main-content fade-in" style="padding:16px;">
    <div class="monitor-layout">

      <!-- ── CAMERA ── -->
      <div class="camera-panel">
        <div class="camera-frame" id="cameraFrame">
          <div class="hud-corner hud-tl"></div>
          <div class="hud-corner hud-tr"></div>
          <div class="hud-corner hud-bl"></div>
          <div class="hud-corner hud-br"></div>
          <div class="scan-overlay"></div>

          <div class="cam-overlay">
            <div class="cam-status-badge normal" id="camStatusBadge">● NORMAL</div>
            <div class="cam-overlay-right">
              <div class="cam-meta-pill" id="camVehiclePill">VEHICLES: 0</div>
              <div class="cam-meta-pill" id="camConfPill">CONF: 0%</div>
              <div class="cam-meta-pill" id="camFpsPill">LIVE ~12FPS</div>
            </div>
          </div>

          <img id="camFeed" class="cam-feed"
            src="http://192.168.8.122/capture"
            alt="ESP32-CAM Feed"
            onerror="showOffline()"
            onload="showOnline()"
          />

          <div class="cam-offline" id="camOffline" style="display:none;">
            <div class="cam-offline-icon">📷</div>
            <div>CAMERA OFFLINE</div>
            <div style="font-size:10px; margin-top:4px; color:var(--text-dim);">
              http://192.168.8.122/capture
            </div>
            <button class="control-btn" onclick="reconnectCamera()" style="margin-top:8px;">
              ↺ RECONNECT
            </button>
          </div>

          <div class="cam-bottom-overlay">
            <div class="cam-timestamp" id="camTimestamp">--:--:--</div>
            <div class="cam-source">SRC: 192.168.8.122 · ESP32-CAM</div>
          </div>
        </div>

        <!-- Controls -->
        <div class="detail-card" style="padding:12px 18px;">
          <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
            <div style="display:flex; align-items:center; gap:10px;">
              <button class="control-btn active" id="btnStream"   onclick="setMode('stream')">📡 STREAM</button>
              <button class="control-btn"         id="btnSnapshot" onclick="setMode('snapshot')">📸 SNAPSHOT</button>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <span class="rate-label">REFRESH:</span>
              <select class="input" id="refreshRate" onchange="setRefreshRate(this.value)"
                style="padding:5px 28px 5px 10px; font-size:11px;">
                <option value="2000">2s</option>
                <option value="5000" selected>5s</option>
                <option value="10000">10s</option>
              </select>
              <button class="control-btn" onclick="takeSnapshot()">💾 CAPTURE</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ── RIGHT PANEL ── -->
      <div class="right-panel">

        <div class="detail-card" id="detailCard">
          <div class="card-title">Detection Details</div>
          <div class="detail-row">
            <span class="detail-key">STATUS</span>
            <span class="detail-val" id="detStatus">—</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">VEHICLES</span>
            <span class="detail-val" id="detVehicles">—</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">CLASS</span>
            <span class="detail-val" id="detClass">—</span>
          </div>
          <div class="detail-row">
            <span class="detail-key">CONFIDENCE</span>
            <div style="text-align:right;">
              <span class="detail-val" id="detConf">—</span>
              <div class="conf-bar-wrap">
                <div class="conf-bar-fill" id="detConfBar" style="width:0%"></div>
              </div>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-key">UPDATED</span>
            <span class="detail-val" id="detTime" style="font-size:12px;">—</span>
          </div>
          <div style="margin-top:12px;">
            <div class="detail-key" style="margin-bottom:6px;">VEHICLE GRID</div>
            <div class="vehicle-counter" id="vehicleGrid"></div>
          </div>
        </div>

        <div class="alert-log">
          <div class="alert-log-header">
            <div class="alert-log-title">Alert Log</div>
            <div class="alert-count" id="alertCount">0 events</div>
          </div>
          <div class="alert-list" id="alertList">
            <div class="empty-state">WAITING FOR EVENTS...</div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer" id="footer"></footer>
</div>

<script src="js/shared.js"></script>
<script>
  initPage("live", "Live Monitor", "// MONITOR / LIVE FEED");

  const ESP32_CAPTURE = "http://192.168.8.122/capture";

  let mode         = "stream";
  let refreshTimer = null;
  let refreshRate  = 5000;
  let alertLog     = [];
  let lastStatus   = null;

  // ── CAMERA STATE ─────────────────────────
  function showOnline() {
    document.getElementById("camFeed").style.display    = "block";
    document.getElementById("camOffline").style.display = "none";
  }

  function showOffline() {
    document.getElementById("camFeed").style.display    = "none";
    document.getElementById("camOffline").style.display = "flex";
  }

  function reconnectCamera() {
    setMode(mode);
  }

  // ── CLOCK ────────────────────────────────
  setInterval(() => {
    const el = document.getElementById("camTimestamp");
    if (el) el.textContent = new Date().toTimeString().slice(0, 8);
  }, 1000);

  // ── MODE SWITCH ──────────────────────────
  function setMode(m) {
    mode = m;
    document.getElementById("btnStream").classList.toggle("active",   m === "stream");
    document.getElementById("btnSnapshot").classList.toggle("active", m === "snapshot");

    clearInterval(refreshTimer);
    clearTimeout(refreshTimer);
    refreshTimer = null;

    const feed = document.getElementById("camFeed");

    if (m === "stream") {
      // Chain requests to simulate live video (~12fps)
      function fetchNext() {
        const img  = new Image();
        img.onload = () => {
          feed.src = img.src;
          showOnline();
          if (mode === "stream") refreshTimer = setTimeout(fetchNext, 80);
        };
        img.onerror = () => {
          showOffline();
          if (mode === "stream") refreshTimer = setTimeout(fetchNext, 1000);
        };
        img.src = ESP32_CAPTURE + "?t=" + Date.now();
      }
      fetchNext();
      document.getElementById("camFpsPill").textContent = "LIVE ~12FPS";
    } else {
      feed.src = ESP32_CAPTURE + "?t=" + Date.now();
      refreshTimer = setInterval(() => {
        feed.src = ESP32_CAPTURE + "?t=" + Date.now();
      }, refreshRate);
      document.getElementById("camFpsPill").textContent = "SNAPSHOT";
    }
  }

  function setRefreshRate(val) {
    refreshRate = parseInt(val);
    if (mode === "snapshot") {
      clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        document.getElementById("camFeed").src = ESP32_CAPTURE + "?t=" + Date.now();
      }, refreshRate);
    }
  }

  // ── SNAPSHOT SAVE ─────────────────────────
  function takeSnapshot() {
    const feed   = document.getElementById("camFeed");
    const canvas = document.createElement("canvas");
    canvas.width  = feed.naturalWidth  || 640;
    canvas.height = feed.naturalHeight || 480;
    canvas.getContext("2d").drawImage(feed, 0, 0);
    const link    = document.createElement("a");
    link.href     = canvas.toDataURL("image/jpeg", 0.95);
    link.download = `capture_${new Date().toISOString().slice(0,19).replace(/:/g,"-")}.jpg`;
    link.click();
    showToast("📸 Snapshot saved!", "success");
  }

  // ─────────────────────────────────────────
  //  ★ UPDATE DETECTION UI
  //  Called by startStatusPoll every 5s
  // ─────────────────────────────────────────
  function updateDetectionUI(data) {
    if (!data) return;

    const status   = data.status || "NORMAL";
    const vehicles = data.vehicle_count ?? 0;
    const cls      = data.accident_class || "none";
    const conf     = data.confidence ?? 0;
    const confPct  = Math.round(conf * 100);
    const color    = getStatusColor(status);
    const statusCls = getStatusClass(status);

    // Camera badge
    const badge = document.getElementById("camStatusBadge");
    badge.className   = `cam-status-badge ${statusCls}`;
    badge.textContent = `● ${status}`;

    // Pills
    document.getElementById("camVehiclePill").textContent = `VEHICLES: ${vehicles}`;
    document.getElementById("camConfPill").textContent    = `CONF: ${confPct}%`;

    // Detail card
    document.getElementById("detStatus").textContent      = status;
    document.getElementById("detStatus").style.color      = color;
    document.getElementById("detVehicles").textContent    = vehicles;
    document.getElementById("detClass").textContent       = cls.toUpperCase();
    document.getElementById("detConf").textContent        = `${confPct}%`;
    document.getElementById("detConfBar").style.width     = `${confPct}%`;
    document.getElementById("detConfBar").style.background = color;
    document.getElementById("detTime").textContent        =
      data.timestamp ? timeAgo(data.timestamp) : "Just now";
    document.getElementById("detailCard")
      .style.setProperty("--detail-color", color);

    // Vehicle dot grid
    const grid = document.getElementById("vehicleGrid");
    grid.innerHTML = "";
    for (let i = 0; i < 20; i++) {
      const dot = document.createElement("div");
      dot.className = `vehicle-dot ${i < vehicles ? "active" : ""}`;
      grid.appendChild(dot);
    }

    // Alert log on status change
    if (status !== lastStatus) {
      addAlert(status, vehicles, confPct);
      lastStatus = status;
    }
  }

  // ── ALERT LOG ────────────────────────────
  function addAlert(status, vehicles, confPct) {
    const statusCls = getStatusClass(status);
    const icon = statusCls === "accident"   ? "🚨" :
                 statusCls === "congestion" ? "🚦" : "✅";
    alertLog.unshift({
      status, vehicles, confPct, icon,
      ts: new Date().toTimeString().slice(0, 8),
      statusCls
    });
    if (alertLog.length > 50) alertLog.pop();
    renderAlerts();
  }

  function renderAlerts() {
    const list = document.getElementById("alertList");
    document.getElementById("alertCount").textContent =
      `${alertLog.length} event${alertLog.length !== 1 ? "s" : ""}`;

    if (!alertLog.length) {
      list.innerHTML = `<div class="empty-state">WAITING FOR EVENTS...</div>`;
      return;
    }

    list.innerHTML = alertLog.map(a => `
      <div class="alert-entry">
        <div class="alert-icon">${a.icon}</div>
        <div class="alert-body">
          <div class="alert-status ${a.statusCls}">${a.status}</div>
          <div class="alert-detail">Vehicles: ${a.vehicles} · Conf: ${a.confPct}%</div>
        </div>
        <div class="alert-time">${a.ts}</div>
      </div>
    `).join("");
  }

  // ── BOOT ─────────────────────────────────
  setMode("stream"); // start live feed immediately

  // ★ Poll API every 5s → updateDetectionUI keeps detection panel fresh
  startStatusPoll((data) => {
    updateDetectionUI(data);
  });
</script>
</body>
</html>
