<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Traffic — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* ── VARIABLES ── */
  :root {
    --bg-deep:      #020b18;
    --bg-panel:     #041020;
    --bg-card:      #071828;
    --blue-bright:  #00c8ff;
    --blue-mid:     #0080c8;
    --blue-dark:    #003860;
    --blue-glow:    rgba(0,200,255,0.15);
    --blue-glow2:   rgba(0,200,255,0.05);
    --text-primary: #e0f4ff;
    --text-muted:   #5a8aaa;
    --text-dim:     #2a4a60;
    --accent-green: #00ff88;
    --accent-red:   #ff3355;
    --border:       rgba(0,200,255,0.12);
    --border-bright:rgba(0,200,255,0.35);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 20s linear infinite;
  }

  @keyframes gridScroll {
    0%   { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .bg-radial {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0,80,160,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 30%, rgba(0,40,100,0.2) 0%, transparent 70%);
  }

  /* Scanning line */
  .scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
    opacity: 0.3;
    animation: scan 8s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { top: -2px; }
    100% { top: 100vh; }
  }

  /* ── MAIN LAYOUT ── */
  .page-wrap {
    display: flex;
    width: 100%;
    max-width: 1000px;
    min-height: 560px;
    position: relative;
    z-index: 10;
    padding: 20px;
    gap: 0;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px 40px;
    border: 1px solid var(--border);
    border-right: none;
    background: rgba(4,16,32,0.85);
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }

  .left-panel::before {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,200,255,0.06), transparent 70%);
  }

  .brand-icon {
    width: 54px; height: 54px;
    border: 2px solid var(--blue-bright);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
    box-shadow: 0 0 20px rgba(0,200,255,0.2);
  }

  .brand-icon svg {
    width: 28px; height: 28px;
    fill: var(--blue-bright);
  }

  .brand-dot {
    position: absolute;
    top: -4px; right: -4px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent-green);
    box-shadow: 0 0 8px var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform: scale(1); }
    50%      { opacity:0.5; transform: scale(0.8); }
  }

  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--blue-bright);
    margin-bottom: 12px;
  }

  .left-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  .left-title span {
    color: var(--blue-bright);
  }

  .left-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 300px;
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 20px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--blue-bright);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Divider */
  .v-divider {
    width: 1px;
    background: linear-gradient(to bottom,
      transparent,
      var(--border-bright) 30%,
      var(--border-bright) 70%,
      transparent
    );
  }

  /* ── RIGHT PANEL (FORM) ── */
  .right-panel {
    width: 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px 40px;
    border: 1px solid var(--border);
    background: rgba(7,24,40,0.92);
    backdrop-filter: blur(20px);
    position: relative;
  }

  .right-panel::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
  }

  .form-header {
    margin-bottom: 32px;
  }

  .form-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--blue-mid);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .form-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
  }

  /* Form elements */
  .form-group {
    margin-bottom: 20px;
    position: relative;
  }

  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: var(--text-dim);
    font-size: 15px;
    pointer-events: none;
    transition: color 0.2s;
  }

  .form-input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(0,50,100,0.2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }

  .form-input::placeholder { color: var(--text-dim); }

  .form-input:focus {
    border-color: var(--blue-bright);
    background: rgba(0,100,180,0.12);
    box-shadow: 0 0 0 3px rgba(0,200,255,0.08);
  }

  .form-input:focus + .input-icon,
  .input-wrap:focus-within .input-icon {
    color: var(--blue-bright);
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue-mid), var(--blue-bright));
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }

  .btn-submit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .btn-submit:hover::after { transform: translateX(100%); }

  /* Error / success messages */
  .msg {
    padding: 10px 14px;
    border-radius: 5px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .msg.error {
    background: rgba(255,51,85,0.1);
    border: 1px solid rgba(255,51,85,0.3);
    color: #ff6680;
    display: block;
  }
  .msg.success {
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.25);
    color: var(--accent-green);
    display: block;
  }

  /* Footer link */
  .form-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .form-footer a {
    color: var(--blue-bright);
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .form-footer a:hover { opacity: 0.75; }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--blue-bright);
    border-style: solid;
    opacity: 0.5;
  }
  .corner-tl { top:12px; left:12px; border-width:2px 0 0 2px; }
  .corner-tr { top:12px; right:12px; border-width:2px 2px 0 0; }
  .corner-bl { bottom:12px; left:12px; border-width:0 0 2px 2px; }
  .corner-br { bottom:12px; right:12px; border-width:0 2px 2px 0; }

  /* Loading spinner on button */
  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Animate in */
  .page-wrap { animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    .left-panel { display: none; }
    .v-divider  { display: none; }
    .right-panel { width: 100%; border-radius: 8px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-radial"></div>
<div class="scan-line"></div>

<div class="page-wrap">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="corner corner-tl"></div>
    <div class="corner corner-bl"></div>

    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      <div class="brand-dot"></div>
    </div>

    <div class="brand-name">Smart Traffic</div>
    <h1 class="left-title">
      Intelligent<br>Traffic <span>Detection</span><br>System
    </h1>
    <p class="left-desc">
      Real-time vehicle monitoring and accident detection powered by YOLO11 and ESP32-CAM.
    </p>

    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-value">97.9%</span>
        <span class="stat-label">Accuracy</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">2</span>
        <span class="stat-label">Classes</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">Live</span>
        <span class="stat-label">Stream</span>
      </div>
    </div>
  </div>

  <div class="v-divider"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="corner corner-tr"></div>
    <div class="corner corner-br"></div>

    <div class="form-header">
      <div class="form-eyebrow">// ACCESS CONTROL</div>
      <div class="form-title">Sign In</div>
    </div>

    <div id="msg" class="msg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap">
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
          <span class="input-icon">✉</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnText">ACCESS SYSTEM</span>
        <div class="spinner" id="spinner"></div>
      </button>

    </form>

    <div class="form-footer">
      No account? <a href="signup.html">Create one →</a>
    </div>
  </div>

</div>

<script>
  const API = "http://localhost:8000";

  async function handleLogin(e) {
    e.preventDefault();

    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const msg      = document.getElementById("msg");
    const btnText  = document.getElementById("btnText");
    const spinner  = document.getElementById("spinner");

    // Show loading
    btnText.style.display  = "none";
    spinner.style.display  = "block";
    msg.className = "msg";
    msg.textContent = "";

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        // Save token and user info
        localStorage.setItem("token",    data.token);
        localStorage.setItem("username", data.username);
        localStorage.setItem("role",     data.role);

        // Success message then redirect
        msg.className   = "msg success";
        msg.textContent = `✓ Welcome back, ${data.username}! Redirecting...`;

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);

      } else {
        msg.className   = "msg error";
        msg.textContent = `✖ ${data.detail || "Login failed. Please try again."}`;
        btnText.style.display = "block";
        spinner.style.display = "none";
      }

    } catch (err) {
      msg.className   = "msg error";
      msg.textContent = "✖ Cannot connect to server. Make sure backend is running.";
      btnText.style.display = "block";
      spinner.style.display = "none";
    }
  }

  // Redirect if already logged in
  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
